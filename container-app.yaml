properties:
  template:
    containers:
      - name: nginx
        image: nginx:alpine
        resources:
          cpu: 0.25
          memory: 0.5Gi
        volumeMounts:
          - volumeName: prototypes-vol
            mountPath: /usr/share/nginx/html
    volumes:
      - name: prototypes-vol
        storageName: prototypes-storage
        storageType: AzureFile
    scale:
      minReplicas: 1
      maxReplicas: 1
